name: Deploy Debian Repo

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Aptly
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly

      - name: Import GPG Key
        run: |
          # Decode the secret and import it into the runner's GPG keychain
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Initialize and Publish Repo
        run: |
          aptly repo create -distribution="stable" -component="main" my-repo
          aptly repo add my-repo packages/
          
          # Use GPG signing here. 
          aptly publish repo -batch \
            my-repo .
          
          mkdir -p public
          cp -r ~/.aptly/public/* public/
          
          # Copy public key to the root so users can download it
          gpg --armor --export YOUR_KEY_ID > public/public-key.gpg

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
