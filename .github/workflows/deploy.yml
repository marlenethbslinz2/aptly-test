name: Deploy Debian Repo

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Aptly
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly

      - name: Import GPG Key
        run: |
          # Decode the secret and import it into the runner's GPG keychain
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import

      - name: Initialize Aptly Repo
        run: |
          # Create the repo
          aptly repo create -distribution="stable" -component="main" my-repo
          
          # Add packages
          aptly repo add my-repo packages/
          
          # Publish to a SPECIFIC prefix (the dot "." means root)
          # This is the most important part!
          aptly publish repo -batch -skip-signing=true my-repo .
          
          # Clear and prepare public folder
          rm -rf public
          mkdir -p public
          
          # Copy everything from aptly's internal public folder to our deployment folder
          cp -r ~/.aptly/public/* public/
          
          # List files for debugging
          ls -R public

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
