name: Deploy Debian Repo

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual run

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Aptly
        run: |
          sudo apt-get update
          sudo apt-get install -y aptly

      - name: Initialize Aptly Repo
        run: |
          # Create and publish the repo locally in the runner
          aptly repo create -distribution="stable" -component="main" my-repo
          aptly repo add my-repo packages/
          aptly publish repo -batch -skip-signing=true my-repo .
          
          # Prepare the public folder for deployment
          mkdir -p public
          touch public/.nojekyll
          cp -r ~/.aptly/public/* public/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public' # Only upload the generated repo files

  deploy:
    needs: build-repo # Ensures deploy runs AFTER build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4